<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishesh Kumar Dubey | Portfolio</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
    color:#333;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
}

.hero h1{
    margin-top:20px;
    font-size:2.5rem;
}

.hero h3{
    color:#555;
    margin-top:10px;
}

.hero p{
    margin-top:15px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.7;
}

.links{
    margin-top:20px;
}

.links a{
    text-decoration:none;
    margin:0 10px;
    color:#0077cc;
    font-weight:bold;
}
</style>
</head>
<body>

</body>
</html>
